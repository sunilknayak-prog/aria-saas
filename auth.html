<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — Sign in</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
:root{--bg:#07080f;--bg2:#0d0f1a;--surface:#111420;--border:#1e2340;--border2:#252a45;--accent:#4f6ef7;--accent2:#7c5ef4;--green:#10d9a0;--text:#e8eaf6;--text2:#8891b4;--text3:#454d6d;--red:#f04f4f;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:white}
.logo-name{font-size:20px;font-weight:600}
.tabs{display:flex;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:14px;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--accent);color:white;font-weight:500}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:var(--sans);transition:all .15s;margin-top:8px}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:#3d5be5}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{background:var(--surface);border:1px solid var(--border2);color:var(--text);display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-google:hover{border-color:var(--text3)}
.error{background:rgba(240,79,79,.1);border:1px solid rgba(240,79,79,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}
.error.visible{display:block}
.success{background:rgba(16,217,160,.1);border:1px solid rgba(16,217,160,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:14px;display:none}
.success.visible{display:block}
.footer-note{text-align:center;font-size:12px;color:var(--text3);margin-top:20px}
.footer-note a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">A</div>
    <div class="logo-name">ARIA</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</div>
  </div>

  <div id="error-box" class="error"></div>
  <div id="success-box" class="success"></div>

  <!-- SIGN IN -->
  <div id="form-signin">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="you@agency.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="signin-btn" onclick="signIn()">Sign in to ARIA</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGN UP -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="signup-name" placeholder="Jane Smith">
    </div>
    <div class="form-group">
      <label>Work email</label>
      <input type="email" id="signup-email" placeholder="you@agency.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 8 characters">
    </div>
    <div class="form-group">
      <label>Agency name</label>
      <input type="text" id="signup-agency" placeholder="Your agency name">
    </div>
    <button class="btn btn-primary" id="signup-btn" onclick="signUp()">Create account</button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="footer-note">
    By continuing you agree to ARIA's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
  </div>
</div>

<script>
// ─── CONFIG — replace with your Supabase project values ───────────────────
const SUPABASE_URL = 'https://tyzhmczoehvbefzzlkpw.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5emhtY3pvZWh2YmVmenpsa3B3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjQzMDYsImV4cCI6MjA5NzQ0MDMwNn0.0aC6rLeO_i5png6WiH7CL5dcxceUxi6dXG_RUJPLZMo'
// ──────────────────────────────────────────────────────────────────────────

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

function switchTab(tab) {
  document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none'
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none'
  document.getElementById('tab-signin').className = 'tab' + (tab === 'signin' ? ' active' : '')
  document.getElementById('tab-signup').className = 'tab' + (tab === 'signup' ? ' active' : '')
  clearMessages()
}

function showError(msg) {
  const el = document.getElementById('error-box')
  el.textContent = msg
  el.classList.add('visible')
  document.getElementById('success-box').classList.remove('visible')
}

function showSuccess(msg) {
  const el = document.getElementById('success-box')
  el.textContent = msg
  el.classList.add('visible')
  document.getElementById('error-box').classList.remove('visible')
}

function clearMessages() {
  document.getElementById('error-box').classList.remove('visible')
  document.getElementById('success-box').classList.remove('visible')
}

async function signIn() {
  const email = document.getElementById('signin-email').value.trim()
  const password = document.getElementById('signin-password').value
  if (!email || !password) return showError('Please enter your email and password.')
  const btn = document.getElementById('signin-btn')
  btn.disabled = true; btn.textContent = 'Signing in...'
  const { data, error } = await sb.auth.signInWithPassword({ email, password })
  if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Sign in to ARIA'; return }
  await checkSubscriptionAndRedirect(data.user)
}

async function signUp() {
  const name = document.getElementById('signup-name').value.trim()
  const email = document.getElementById('signup-email').value.trim()
  const password = document.getElementById('signup-password').value
  const agency = document.getElementById('signup-agency').value.trim()
  if (!name || !email || !password || !agency) return showError('Please fill in all fields.')
  if (password.length < 8) return showError('Password must be at least 8 characters.')
  const btn = document.getElementById('signup-btn')
  btn.disabled = true; btn.textContent = 'Creating account...'
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name, agency_name: agency } }
  })
  if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Create account'; return }
  showSuccess('Account created! Check your email to confirm, then come back to sign in.')
  btn.disabled = false; btn.textContent = 'Create account'
}

async function signInGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/checkout.html' }
  })
  if (error) showError(error.message)
}

async function checkSubscriptionAndRedirect(user) {
  // Check if user has active subscription in Supabase
  const { data } = await sb.from('subscriptions').select('status').eq('user_id', user.id).single()
  if (data?.status === 'active') {
    window.location.href = 'app.html'
  } else {
    window.location.href = 'checkout.html'
  }
}

// Auto-redirect if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) checkSubscriptionAndRedirect(session.user)
})
</script>
</body>
</html>
