<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — AI Marketing Command Centre for Agencies</title>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #07080f;
  --bg2: #0d0f1a;
  --surface: #111420;
  --border: #1e2340;
  --border2: #252a45;
  --accent: #4f6ef7;
  --accent2: #7c5ef4;
  --green: #10d9a0;
  --amber: #f5a623;
  --text: #e8eaf6;
  --text2: #8891b4;
  --text3: #454d6d;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --glow: rgba(79,110,247,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.6; overflow-x: hidden; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; padding: 0 40px; height: 64px;
  background: rgba(7,8,15,0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: white; font-family: var(--mono);
}
.nav-logo-name { font-size: 17px; font-weight: 600; }
.nav-spacer { flex: 1; }
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a { color: var(--text2); text-decoration: none; font-size: 14px; transition: color .15s; }
.nav-links a:hover { color: var(--text); }
.nav-cta {
  margin-left: 24px; background: var(--accent);
  color: white; padding: 8px 20px; border-radius: 8px;
  font-size: 14px; font-weight: 500; text-decoration: none;
  transition: background .15s;
}
.nav-cta:hover { background: #3d5be5; }

/* SECTIONS */
section { padding: 100px 40px; max-width: 1100px; margin: 0 auto; }

/* HERO */
.hero { padding-top: 160px; text-align: center; max-width: 820px; margin: 0 auto; padding-bottom: 60px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(79,110,247,0.1); border: 1px solid rgba(79,110,247,0.3);
  border-radius: 20px; padding: 6px 16px; font-size: 12px;
  color: var(--accent); margin-bottom: 28px; font-weight: 500;
}
.hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.hero h1 {
  font-size: 58px; font-weight: 700; line-height: 1.1;
  letter-spacing: -.02em; margin-bottom: 24px;
  background: linear-gradient(135deg, #fff 40%, var(--text2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero h1 span { -webkit-text-fill-color: var(--accent); }
.hero p { font-size: 18px; color: var(--text2); max-width: 560px; margin: 0 auto 36px; line-height: 1.7; }
.hero-ctas { display: flex; align-items: center; gap: 14px; justify-content: center; }
.btn-primary {
  background: var(--accent); color: white; padding: 14px 28px;
  border-radius: 10px; font-size: 15px; font-weight: 600;
  text-decoration: none; border: none; cursor: pointer;
  transition: all .15s; display: inline-block;
}
.btn-primary:hover { background: #3d5be5; transform: translateY(-1px); }
.btn-ghost {
  color: var(--text2); padding: 14px 28px; border-radius: 10px;
  font-size: 15px; font-weight: 500; text-decoration: none;
  border: 1px solid var(--border2); transition: all .15s; display: inline-block;
}
.btn-ghost:hover { color: var(--text); border-color: var(--text3); }
.hero-sub { margin-top: 20px; font-size: 13px; color: var(--text3); }

/* VIDEO STYLING */
.video-section { max-width: 850px; margin: 0 auto 80px; padding: 0 20px; text-align: center; }
.video-title { color: #ffffff; margin-bottom: 20px; font-weight: 600; font-size: 1.5rem; letter-spacing: -.01em; }
.video-wrapper { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(79,110,247,0.15); background: #000; border: 1px solid var(--border); }

/* STATS BAR */
.stats-bar {
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  background: var(--bg2); padding: 32px 40px;
}
.stats-inner {
  max-width: 1100px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(4,1fr); gap: 0;
}
.stat { text-align: center; padding: 0 20px; border-right: 1px solid var(--border); }
